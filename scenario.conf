# Execution Continuity Decision Engine - scenario configuration
# Edit values here to run different experiments without recompiling.
# Any key left out falls back to the framework's original default.

# ---- RSU / boundary geometry (Method C capacity math) ----
rsu_radius_m=200.0
rsu_gap_m=5.0
proc_ms_per_frame=70.0

# ---- Execution state model ----
server_a.baseline_state_size_mb=1.0
server_a.state_growth_amplitude_mb=3.0
server_b.baseline_state_size_mb=1.0
server_b.state_growth_amplitude_mb=3.5

# ---- Decision cadence ----
context_monitor_interval_s=1

# ---- Vehicle Controller live command port (Terminal 3) ----
# Separate from the data port (8080). ONLY Server A binds this - it is the
# single source of truth for vehicle behaviour and forwards anything
# Server B needs to know over the existing data channel. Server B never
# binds this port.
controller_port=9090

# ---- Packet loss statistics ----
# Loss % is meaningless over a tiny sample (one early reorder out of two
# packets reads as 50%); hold at 0% until this many packets are accounted for.
min_loss_sample_count=20

# ---- Server A simulated network readings (CPU/memory/queue are REAL now -
#      see traffic_load.h - only bandwidth/latency/RSSI stay simulated) ----
server_a.bandwidth_base_mbps=10.0
server_a.bandwidth_amplitude_mbps=10.0
server_a.bandwidth_frequency=0.3
server_a.latency_base_ms=0.05
server_a.latency_amplitude_ms=0.01
server_a.latency_frequency=1.1
server_a.rssi_base_dbm=-55.0
server_a.rssi_amplitude_dbm=-15.0
server_a.rssi_frequency=0.2
server_a.packet_loss_pct_fixed=1.0

# ---- Server B simulated network readings (CPU/memory/queue are REAL now) ----
server_b.bandwidth_base_mbps=12.0
server_b.bandwidth_amplitude_mbps=10.0
server_b.bandwidth_frequency=0.25
server_b.latency_base_ms=0.05
server_b.latency_amplitude_ms=0.02
server_b.latency_frequency=0.9
server_b.rssi_base_dbm=-58.0
server_b.rssi_amplitude_dbm=-14.0
server_b.rssi_frequency=0.18

# ---- Method C (speculative offload) ----
method_c.wire_task_type=0

# ---- Method B (downlink cache shift) ----
method_b.fast_speed_threshold_kmh=100.0
method_b.read_by_car_normal=9
method_b.read_by_car_fast=7
method_b.total_packets=10
method_b.wire_task_type=1

# ---- CSV logging ----
csv_log_path=continuity_log.csv

# ---- Failure injection ----
# Each fault fires once, "at_s" seconds after the run starts, if enabled.
failure.bandwidth_drop.enabled=false
failure.bandwidth_drop.at_s=5.0
failure.bandwidth_drop.value_mbps=1.0

failure.packet_loss_spike.enabled=false
failure.packet_loss_spike.at_s=5.0
failure.packet_loss_spike.value_pct=40.0

failure.cpu_overload.enabled=false
failure.cpu_overload.at_s=5.0
failure.cpu_overload.value_pct=98.0

failure.memory_shortage.enabled=false
failure.memory_shortage.at_s=5.0
failure.memory_shortage.value_mb=8.0

failure.vehicle_exit_early.enabled=false
failure.vehicle_exit_early.at_s=5.0

failure.prediction_failure.enabled=false
failure.prediction_failure.at_s=5.0

failure.server_unavailable.enabled=false
failure.server_unavailable.at_s=5.0
